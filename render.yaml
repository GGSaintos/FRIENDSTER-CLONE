databases:
  - name: friendster-db
    databaseName: friendster
    plan: free

services:
  - type: web
    name: friendster-clone
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: friendster-db
          property: connectionString



