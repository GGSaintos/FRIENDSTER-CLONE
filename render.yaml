databases:
  - name: friendster-db
    databaseName: friendster
    plan: free

services:
  - type: web
    name: friendster-clone
    runtime: node
    plan: free
    buildCommand: bash render-build.sh
    startCommand: node server.js
    healthCheckPath: /healthz
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: friendster-db
          property: connectionString



